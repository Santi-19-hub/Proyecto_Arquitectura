<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - Microservicios</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-10">

    <div class="max-w-4xl mx-auto">
        <h2 class="text-3xl font-bold mb-6 text-blue-400">Panel de Control de Usuarios</h2>
        
        <form id="userForm" class="bg-gray-800 p-6 rounded-lg mb-10 flex gap-4 items-end border border-gray-700">
            <input type="hidden" id="userId">
            <div class="flex-1">
                <label class="block text-xs uppercase font-bold text-gray-400 mb-1">Nombre</label>
                <input type="text" id="nombre" required class="w-full p-2 rounded bg-gray-700 border-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex-1">
                <label class="block text-xs uppercase font-bold text-gray-400 mb-1">Correo</label>
                <input type="email" id="correo" required class="w-full p-2 rounded bg-gray-700 border-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" id="btnSubmit" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded font-bold transition">Guardar</button>
        </form>

        <div class="bg-gray-800 rounded-lg overflow-hidden border border-gray-700">
            <table class="w-full text-left">
                <thead class="bg-gray-700 text-gray-300">
                    <tr>
                        <th class="p-4">ID</th>
                        <th class="p-4">Nombre</th>
                        <th class="p-4">Correo</th>
                        <th class="p-4 text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="listaUsuarios">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/usuarios';
        const lista = document.getElementById('listaUsuarios');

        
        async function cargarUsuarios() {
            const res = await fetch('http://localhost:3000/api/todos');
            const usuarios = await res.json();
            lista.innerHTML = '';
            usuarios.forEach(u => {
                lista.innerHTML += `
                    <tr class="border-t border-gray-700">
                        <td class="p-4">${u.id}</td>
                        <td class="p-4">${u.nombre}</td>
                        <td class="p-4">${u.correo}</td>
                        <td class="p-4 text-center">
                            <button onclick="prepararEdicion(${u.id}, '${u.nombre}', '${u.correo}')" class="text-yellow-500 mr-3">✏️</button>
                            <button onclick="borrarUsuario(${u.id})" class="text-red-500">🗑️</button>
                        </td>
                    </tr>
                `;
            });
        }

        
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const nombre = document.getElementById('nombre').value;
            const correo = document.getElementById('correo').value;

            const metodo = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            await fetch(url, {
                method: metodo,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, correo })
            });

            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('btnSubmit').textContent = 'Guardar';
            cargarUsuarios();
        });

        
        async function borrarUsuario(id) {
            if (confirm('¿Seguro que quieres borrarlo?')) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                cargarUsuarios();
            }
        }

        
        function prepararEdicion(id, nombre, correo) {
            document.getElementById('userId').value = id;
            document.getElementById('nombre').value = nombre;
            document.getElementById('correo').value = correo;
            document.getElementById('btnSubmit').textContent = 'Actualizar';
        }

        cargarUsuarios(); 
    </script>
</body>
</html>
